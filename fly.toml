app = "uk-property-mcp"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  FASTMCP_HOST = "0.0.0.0"
  FASTMCP_PORT = "8080"
  FASTMCP_STATELESS_HTTP = "true"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[metrics]
  port = 8080
  path = "/metrics"
